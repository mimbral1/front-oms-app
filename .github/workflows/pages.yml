name: Deploy preview to GitHub Pages

# Despliega el static export (./out) a GitHub Pages para previsualizar la app
# en el navegador / teléfono. NOTA: sin backend conectado solo se ve el login;
# autenticarse y cargar datos requiere las APIs reales (variables NEXT_PUBLIC_*).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build static export (subpath de Pages)
        env:
          PAGES_BASE_PATH: /front-oms-app
          # Preview sin backend: permite navegar la app sin login real.
          NEXT_PUBLIC_PREVIEW_BYPASS_AUTH: "1"
        run: npm run build:app
      - name: Evitar procesamiento Jekyll (_next)
        run: touch out/.nojekyll
      - uses: actions/configure-pages@v5
        with:
          # Habilita GitHub Pages automáticamente si aún no lo está.
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
